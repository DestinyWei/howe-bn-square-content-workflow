<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>币安广场文章排版工具</title>
  <style>
    body { width: 330px; margin: 0; padding: 18px; color: #eaecef; background: #0b0e11; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    h1 { margin: 0 0 4px; font-size: 18px; }
    p { margin: 0 0 14px; color: #929aa5; }
    label { display: block; margin: 10px 0; color: #c9ced5; font-size: 12px; }
    input[type="text"] { box-sizing: border-box; width: 100%; margin-top: 5px; padding: 9px; border: 1px solid #2b3139; border-radius: 7px; color: #eaecef; background: #181a20; }
    .check { display: flex; align-items: center; gap: 7px; }
    .check input { margin: 0; }
    .settings { margin: 12px 0; padding: 10px; border: 1px solid #2b3139; border-radius: 8px; background: #11151b; }
    .settings strong { display: block; margin-bottom: 4px; color: #f0b90b; }
    .hint { font-size: 11px; color: #727a85; }
    button { width: 100%; margin: 6px 0; padding: 11px 12px; border: 1px solid #2b3139; border-radius: 8px; color: #eaecef; background: #181a20; font-weight: 650; cursor: pointer; }
    button:disabled { cursor: progress; opacity: .68; }
    button.primary { border-color: #f0b90b; color: #181a20; background: #f0b90b; }
    #status { position: sticky; top: 0; z-index: 5; min-height: 42px; margin: 12px 0; padding: 10px; border: 1px solid #2b3139; border-radius: 8px; color: #b7bdc6; background: #181a20; white-space: pre-wrap; box-shadow: 0 8px 22px rgba(0,0,0,.28); }
    #status.working { border-color: #f0b90b; color: #f0b90b; }
    #status.ok { border-color: #0ecb81; color: #0ecb81; }
    #status.error { border-color: #f6465d; color: #f6465d; }
    .tweet-assets { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #2b3139; }
    .tweet-assets.is-visible { display: block; }
    .tweet-assets-title { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; color: #eaecef; font-size: 12px; font-weight: 700; }
    .tweet-assets-title span { color: #929aa5; font-weight: 600; }
    .tweet-assets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tweet-asset { min-width: 0; color: #b7bdc6; text-decoration: none; }
    .tweet-asset img { display: block; width: 100%; height: 86px; border: 1px solid #2b3139; border-radius: 7px; object-fit: contain; background: #080b0e; }
    .tweet-asset small { display: block; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #727a85; }
  </style>
</head>
<body>
  <h1>币安广场文章排版工具</h1>
  <p>采集、排版、填入草稿。支持文章和短帖，扩展不会点击发布。</p>
  <div id="status">等待操作</div>
  <button class="primary" id="extract">采集当前 X Article 并打开排版器</button>
  <button id="formatter">打开排版器</button>
  <button id="fill">把已保存版本填入当前币安草稿</button>
  <button id="images">开始 / 继续批量插图助手</button>
  <section class="settings">
    <strong>X 推文 → 币安广场推文</strong>
    <button class="primary" id="extract-tweet">采集当前 X 推文</button>
    <button id="fill-post">填入当前币安广场推文</button>
    <div class="hint">适合单条 X 推文搬运到币安广场短帖输入框；不会点击发布。</div>
    <div class="tweet-assets" id="tweet-assets">
      <div class="tweet-assets-title">推文图片素材 <span id="tweet-assets-count">0 张</span></div>
      <div class="tweet-assets-grid" id="tweet-assets-grid"></div>
    </div>
  </section>
  <section class="settings">
    <strong>图片下载设置</strong>
    <label>下载目录下的子文件夹
      <input id="download-folder" type="text" placeholder="binance-square-assets">
    </label>
    <label class="check"><input id="download-save-as" type="checkbox"> 每次弹出“另存为”选择位置</label>
    <div class="hint">Chrome 只能静默保存到默认下载目录下的子文件夹；勾选“另存为”后可选择其他位置。</div>
    <button id="save-download-settings">保存下载设置</button>
  </section>
  <script src="popup.js"></script>
</body>
</html>
